<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #e5e7eb;
    }

    /* ── Header ── */
    header {
      background: #1f2937;
      padding: 11px 14px;
      border-bottom: 1px solid #374151;
      display: flex; align-items: center; gap: 10px;
    }
    header img { border-radius: 6px; flex-shrink: 0; }
    h1   { font-size: 13px; font-weight: 700; color: #f9fafb; }
    .sub { font-size: 10px; color: #6b7280; margin-top: 1px; }

    main { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Mode pills ── */
    .modes { display: flex; gap: 6px; }
    .mode-pill {
      flex: 1; padding: 7px 0; border-radius: 6px;
      border: 1px solid #374151; background: #1f2937;
      color: #9ca3af; font-size: 11px; font-weight: 600;
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .mode-pill.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    .mode-pill:hover:not(.active) { border-color: #4b5563; color: #d1d5db; }

    /* ── Status bar ── */
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      background: #1f2937; border: 1px solid #374151;
      border-radius: 8px; padding: 9px 12px;
      font-size: 12px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4b5563; flex-shrink: 0; transition: background 0.25s;
    }
    .dot.ok  { background: #22c55e; }
    .dot.rec { background: #dc2626; animation: blink 1s ease-in-out infinite; }
    .dot.warn{ background: #f59e0b; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    #statusText { flex: 1; color: #d1d5db; }
    .timer { font-size: 12px; font-weight: 700; color: #dc2626; font-variant-numeric: tabular-nums; }

    /* ── Video list ── */
    #videoList { display: flex; flex-direction: column; gap: 6px; }

    .video-row {
      display: flex; align-items: center; gap: 10px;
      background: #1f2937; border: 1px solid #374151;
      border-radius: 8px; padding: 10px 12px;
    }
    .video-row.auto-active { border-color: #3b82f6; background: #1a2744; }
    .video-row.recording   { border-color: #dc2626; background: #1f1010; }

    .v-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #374151; flex-shrink: 0;
    }
    .video-row.auto-active .v-dot { background: #3b82f6; }
    .video-row.recording   .v-dot { background: #dc2626; animation: blink 1s ease-in-out infinite; }

    .v-label { flex: 1; font-size: 13px; color: #d1d5db; font-weight: 500; }
    .v-badge { font-size: 10px; color: #dc2626; font-weight: 700; margin-right: 6px; }

    .btn-auto {
      padding: 4px 11px; border: 1px solid #374151;
      background: #1f2937; color: #9ca3af;
      border-radius: 5px; font-size: 11px; font-weight: 600;
      cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .btn-auto:hover { border-color: #3b82f6; color: #60a5fa; }
    .btn-auto.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: background 0.15s; letter-spacing: 0.2px;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-move  { background: #374151; color: #e5e7eb; border: 1px solid #4b5563; }
    .btn-move:not(:disabled):hover { background: #4b5563; }
    .btn-move.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    .btn-stop  { background: #dc2626; color: #fff; display: none; }
    .btn-stop:hover { background: #b91c1c; }

    .empty { font-size: 12px; color: #6b7280; text-align: center; padding: 10px 0; }
    .msg { font-size: 11px; color: #6b7280; text-align: center; min-height: 14px; }
    .msg.err { color: #f87171; }
    .msg.ok  { color: #4ade80; }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" width="26" height="26">
    <div>
      <h1>Video Recorder</h1>
      <div class="sub">Capture video + audio</div>
    </div>
  </header>

  <main>
    <!-- Mode pills -->
    <div class="modes" id="modeRow">
      <div class="mode-pill active" data-mode="video">▶ Video only</div>
      <div class="mode-pill" data-mode="subtitles">📜 Video + Subtitles</div>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <div class="dot" id="dot"></div>
      <span id="statusText">Scanning…</span>
      <span class="timer" id="timer" style="display:none">00:00</span>
    </div>

    <!-- Video list -->
    <div id="videoList"></div>

    <!-- Auto Move -->
    <button class="btn btn-move" id="btnMove" disabled>⟳ Auto Move — Record all in sequence</button>

    <!-- Stop -->
    <button class="btn btn-stop" id="btnStop">⏹ Stop &amp; Save</button>

    <p class="msg" id="msg"></p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
