<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      padding: 16px;
    }

    h1 { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 14px; }

    #videoList { display: flex; flex-direction: column; gap: 8px; }

    .video-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 10px 12px;
      border: 1px solid #2a2a2a;
    }
    .video-row.recording {
      border-color: #e53935;
      background: #1f1010;
    }

    .check {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #1e3a1e;
      color: #4caf50;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
    }
    .video-row.recording .check {
      background: #3a1a1a;
      color: #e53935;
      font-size: 8px;
    }

    .video-label { font-size: 13px; color: #ccc; flex: 1; }

    .rec-badge {
      font-size: 10px;
      font-weight: 700;
      color: #e53935;
      letter-spacing: 0.5px;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .btn-record {
      padding: 4px 10px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-record:hover { background: #0d47a1; }

    .empty { font-size: 13px; color: #555; padding: 8px 0; text-align: center; }

    #btnStop {
      display: none;
      width: 100%;
      margin-top: 12px;
      padding: 9px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #btnStop:hover { background: #c62828; }
  </style>
</head>
<body>
  <h1>Video Recorder</h1>
  <div id="videoList"><p class="empty">Scanning…</p></div>
  <button id="btnStop">⏹ Stop &amp; Save</button>
  <script src="popup.js"></script>
</body>
</html>
