<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #e8e8e8;
      padding: 16px;
    }

    h1 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 14px; }

    #videoList { display: flex; flex-direction: column; gap: 8px; }

    .video-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a1a;
      border-radius: 8px;
      padding: 11px 13px;
      border: 1px solid #2a2a2a;
    }
    .video-row.recording {
      border-color: #e53935;
      background: #1f1010;
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #3a3a3a;
      flex-shrink: 0;
    }
    .video-row.recording .dot {
      background: #e53935;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .info { flex: 1; }
    .info .name { font-size: 13px; color: #ddd; font-weight: 500; }
    .info .dur  { font-size: 11px; color: #555; margin-top: 2px; }

    .rec-label { font-size: 11px; color: #e53935; font-weight: 700; letter-spacing: 0.3px; }

    .btn-start {
      padding: 5px 12px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-start:hover { background: #0d47a1; }

    .empty { font-size: 13px; color: #555; text-align: center; padding: 12px 0; }

    #btnStop {
      display: none;
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #btnStop:hover { background: #c62828; }
  </style>
</head>
<body>
  <h1>Video Recorder</h1>
  <div id="videoList"><p class="empty">Scanning…</p></div>
  <button id="btnStop">⏹ Stop &amp; Save</button>
  <script src="popup.js"></script>
</body>
</html>
